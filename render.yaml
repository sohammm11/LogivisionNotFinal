services:
- type: web
  name: logivision-ai
  env: node
  plan: free
  buildCommand: npm install && npm run build && cd backend && npm install
  startCommand: node backend/server.js
  envVars:
  - key: NODE_ENV
    value: production
  - key: MONGODB_URI
    value: "SET_IN_RENDER_DASHBOARD"
  - key: GEMINI_API_KEY
    value: "SET_IN_RENDER_DASHBOARD"
  - key: RAZORPAY_KEY_ID
    value: "SET_IN_RENDER_DASHBOARD"
  - key: RAZORPAY_KEY_SECRET
    value: "SET_IN_RENDER_DASHBOARD"
  - key: JWT_SECRET
    value: "SET_IN_RENDER_DASHBOARD"
  - key: JWT_EXPIRES_IN
    value: 7d
